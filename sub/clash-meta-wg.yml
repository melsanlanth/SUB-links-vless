  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
  - geosite:private
tun:
  enable: true
  stack: mixed
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
  - any:53
